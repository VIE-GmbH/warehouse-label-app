<!DOCTYPE html>
<html>
<head>
    <title>Quick Label</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Verbindung zum Drucker</h1>

    <label>Registrierte IP-Adresse:</label>
    <select id="savedIp">
        <option value="10.152.4.59">10.152.4.59</option>
    </select>

    <label>Oder eine neue IP eingeben:</label>
    <input type="text" id="customIp" placeholder="z.B: 10.152.4.59">

    <button onclick="goToApp()">Weiter</button>

    <script>
        function goToApp() {
            let saved = document.getElementById("savedIp").value;
            let custom = document.getElementById("customIp").value;

            let ip = custom !== "" ? custom : saved;

            // Sauvegarde dans localStorage
            localStorage.setItem("printerIP", ip);

            // Redirection
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
